name: Build and Push

on:
  push:
    branches: [main]
  schedule:
    - cron: '0 1 * * *'  # 8 PM EST nightly
  workflow_dispatch:

jobs:
  build:
    runs-on: ubuntu-latest
    permissions:
      contents: read
      packages: write

    steps:
      - uses: actions/checkout@v4

      - name: Set up Docker Buildx
        uses: docker/setup-buildx-action@v3

      - name: Log in to ghcr.io
        uses: docker/login-action@v3
        with:
          registry: ghcr.io
          username: ${{ github.repository_owner }}
          password: ${{ secrets.GITHUB_TOKEN }}

      - name: Build image (for smoke test)
        uses: docker/build-push-action@v6
        with:
          context: .
          load: true
          no-cache: true
          tags: ghcr.io/${{ github.repository }}:test

      - name: Inspect /usr/local/bin
        run: docker run --rm --entrypoint /bin/ls ghcr.io/${{ github.repository }}:test -la /usr/local/bin/

      - name: Smoke test — gh
        run: docker run --rm --entrypoint /usr/local/bin/gh ghcr.io/${{ github.repository }}:test --version

      - name: Smoke test — bw
        run: docker run --rm --entrypoint /usr/local/bin/bw ghcr.io/${{ github.repository }}:test --version

      - name: Smoke test — himalaya
        run: docker run --rm --entrypoint /usr/local/bin/himalaya ghcr.io/${{ github.repository }}:test --version

      - name: Smoke test — jq
        run: docker run --rm --entrypoint /usr/bin/jq ghcr.io/${{ github.repository }}:test --version

      - name: Smoke test — kubectl
        run: docker run --rm --entrypoint /usr/local/bin/kubectl ghcr.io/${{ github.repository }}:test version --client

      - name: Push image
        uses: docker/build-push-action@v6
        with:
          context: .
          push: true
          tags: |
            ghcr.io/${{ github.repository }}:latest
            ghcr.io/${{ github.repository }}:sha-${{ github.sha }}
